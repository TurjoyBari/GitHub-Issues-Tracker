<!DOCTYPE html>

    <title>GitHub Issues Tracker | Home </title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- tailwind+daisy  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

        * {
            font-family: "Geist", sans-serif;

<body class="min-h-screen bg-base-200">
    <header>
        <div class="mx-auto w-full bg-base-100 shrink-0 shadow pt-[16px] pb-[16px]">
            <div class="w-11/12 mx-auto flex justify-between">
                <div class="flex items-center gap-[4px]">
                    <img class="w-[36px]" src="./assets/github-logo.png" alt="">
                    <h1 class="font-semibold text-[24px] text-[#1F2937]">GitHub Issues Tracker</h1>
                </div>
                <div class="flex gap-4">
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search" />
                    </label>
                    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
                </div>
            </div>

        </div>
    </header>

    <main class="w-[80%] mx-auto space-y-[16px] ">
        <!-- boutton -->
        <div class="flex flex-col sm:flex-row gap-[8px] bg-base-100 shadow p-[24px] mt-[60px] rounded-[8px]">
            <button onclick="toggleStyle('all-toggle-btn')" id="all-toggle-btn"
                class="bg-[#4A00FF] border-1 border-[#E4E4E7] px-[32px] py-[10px] rounded-[4px] text-white font-semibold text-[12px]">All</button>
            <button onclick="toggleStyle('open-toggle-btn')" id="open-toggle-btn"
                class="bg-[#FFFFFF] border-1 border-[#E4E4E7] px-[32px] py-[10px] rounded-[4px] text-[#64748B] font-semibold text-[12px]">Open</button>
            <button onclick="toggleStyle('closed-toggle-btn')" id="closed-toggle-btn"
                class="bg-[#FFFFFF] border-1 border-[#E4E4E7] px-[32px] py-[10px] rounded-[4px] text-[#64748B] font-semibold text-[12px]">Closed</button>

        </div>
        <!-- count -->
        <div class="bg-base-100 shadow p-[24px] mt-[16px] rounded-[8px] flex justify-between">

                </div>

                <div>
                    <h1 class="font-semibold text-[24px] text-[#1F2937]"><span id="issueCount">0</span> Issues</h1>
                    <p class="font-normal text-[16px] text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 flex-col md:flex-row">
                <div class="flex items-center gap-2">
                    <div class="w-[12px] h-[12px] bg-[#00A96E] rounded-full"></div>Open
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-[12px] h-[12px] bg-[#A855F7] rounded-full"></div>Closed
                </div>

            </div>

        </div>
