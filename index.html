<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Login </title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- tailwind+daisy  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>


</head>

<body class="min-h-screen bg-base-200 mx-auto">

    <div class="form pt-15">
        <div class="card bg-base-100 w-full max-w-lg shrink-0 shadow mx-auto rounded-2xl">
            <div class="logo flex flex-col justify-center items-center mx-auto pt-32 ">
                <div class="mb-[24px]"><img src="assets/github-logo.png" alt=""></div>
                <h1 class="font-semibold text-[24px] text-[#1F2937]">GitHub Issues Tracker</h1>
                <h3 class="font-normal text-[16px] text-[#64748B]">Sign in to manage your issues</h3>
            </div>
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-[16px] font-[500] text-[#1F2937]">Username</label>
                    <input id="input-user" maxlength="5" minlength="5" type="text"
                        class="input w-full rounded-[8PX] bg-base-200" value=""
                        placeholder="Enter Username" />

                    <p class="text-primary">Default: admin</p>

                    <br>

                    <label class="label text-[16px] font-[500] text-[#1F2937]">Password</label>
                    <input id="input-pin" type="password" maxlength="8" class="input w-full rounded-[8px] bg-base-200"
                        placeholder="Enter Password" />

                    <p class="text-primary">Default: admin123</p>
                    <div></div>
                    <button id="login-btn" class="btn btn-primary mt-4 rounded-[8px]">Sign In</button>

                    <br>
                    <div class="divider">OR</div>
                    <div class="flex flex-col justify-center items-center">
                        <p class="mb-[8px]">Demo Credentials:</p>
                        <div class="p-[24px] bg-[#F8FAFC] w-full text-center rounded-[8px]">
                            <p>
                                <span>Username</span>: admin
                            </p>
                            <p>
                                 <span>Password</span>: admin123
                            </p>
                        </div>
                    </div>
                </fieldset>
            </div>
        </div>
    </div>

    <script src="script/login.js"></script>

</body>

</html>
